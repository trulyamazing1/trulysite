<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatchery</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="page-wrap">
    <header class="topbar">
      <a href="index.html" class="mini-link">← Home</a>
      <h1>🐣 Hatchery</h1>
      <a href="menagerie.html" class="mini-link">Menagerie →</a>
    </header>

    <section class="game-layout">
      <div class="egg-panel">
        <div id="egg" class="egg">
          <div id="yolk" class="yolk"></div>
          <div id="shellOverlay" class="shell-overlay"></div>
          <div id="eyeMark" class="eye-mark hidden"></div>
        </div>
      </div>

      <aside class="control-panel">
        <h2>Attunement</h2>
        <p class="small-note">
          The yolk responds to rhythm, variation, and pressure.
        </p>

        <div class="controls">
          <button data-action="gentle">Gentle</button>
          <button data-action="vary">Vary</button>
          <button data-action="repeat">Repeat</button>
          <button data-action="chaos">Chaos</button>
          <button id="hatchBtn" class="primary-action">Complete Hatchery Session</button>
        </div>

        <div class="readout">
          <p><strong>State:</strong> <span id="stateLabel">Dormant</span></p>
          <p><strong>Color Path:</strong> <span id="pathLabel">None yet</span></p>
          <p><strong>Variation:</strong> <span id="variationValue">0</span></p>
          <p><strong>Repetition:</strong> <span id="repetitionValue">0</span></p>
          <p><strong>Stress:</strong> <span id="stressValue">0</span></p>
        </div>
      </aside>
    </section>
  </main>

  <script src="js/hatchery.js"></script>
</body>
</html>
