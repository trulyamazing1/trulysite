<script>
const container = document.getElementById("certificateContent");
const saved = localStorage.getItem("latestCreature");

if (saved) {
  const creature = JSON.parse(saved);

  container.innerHTML = `
    <h2>${creature.symbol} ${creature.name}</h2>
    <p><strong>Origin:</strong> ${creature.origin}</p>
    <p>${creature.text}</p>
    <p><em>The Menagerie remembers.</em></p>
;
}
</script>
