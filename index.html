<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binary Garden</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
    }

    .button {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      background: #22c55e;
      color: #022c22;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🐉 Binary Garden</h1>
    <p>A system where motion reveals meaning.</p>

    <a class="button" href="#">🌿 Enter the Garden</a>
  </div>
</body>
</html>
